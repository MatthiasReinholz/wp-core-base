name: wp-core-base Updates

on:
  schedule:
    - cron: '17 */6 * * *'
  workflow_dispatch:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: wp-core-base-updates
  cancel-in-progress: false

jobs:
  sync:
    if: >
      github.event_name != 'pull_request_target' ||
      (
        github.event.action == 'closed' &&
        github.event.pull_request.merged == true &&
        (
          contains(github.event.pull_request.labels.*.name, 'automation:dependency-update') ||
          contains(github.event.pull_request.labels.*.name, 'automation:framework-update')
        )
      )
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.3'
          coverage: none

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: php tools/wporg-updater/bin/wporg-updater.php sync
