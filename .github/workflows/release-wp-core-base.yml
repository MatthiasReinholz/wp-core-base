name: release-wp-core-base

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing release tag in vX.Y.Z format'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Release wp-core-base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.version }}
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.3'
          coverage: none

      - name: Validate target version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"

          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use vX.Y.Z format." >&2
            exit 1
          fi

          echo "value=${version}" >> "$GITHUB_OUTPUT"
          echo "plain=${version#v}" >> "$GITHUB_OUTPUT"

      - name: Verify release tag comes from a merged release PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          bash scripts/ci/check_framework_release_pr.sh "${GITHUB_REPOSITORY}" "${{ steps.version.outputs.value }}" "$COMMIT_SHA"

      - name: Validate release metadata
        run: php tools/wporg-updater/bin/wporg-updater.php release-verify --repo-root=. --tag=${{ steps.version.outputs.value }}

      - name: Check whether GitHub Release already exists
        id: existing_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: |
          set -euo pipefail
          release_url="${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases/tags/${{ steps.version.outputs.value }}"
          status="$(
            curl -sS \
              -o /tmp/wp-core-base-existing-release.json \
              -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${release_url}"
          )"

          case "${status}" in
            200)
              echo "exists=true" >> "$GITHUB_OUTPUT"
              ;;
            404)
              echo "exists=false" >> "$GITHUB_OUTPUT"
              ;;
            *)
              cat /tmp/wp-core-base-existing-release.json >&2
              echo "Failed to check whether release ${GITHUB_REPOSITORY}@${{ steps.version.outputs.value }} already exists." >&2
              exit 1
              ;;
          esac

      - name: Build vendored framework snapshot
        if: steps.existing_release.outputs.exists != 'true'
        run: |
          php tools/wporg-updater/bin/wporg-updater.php build-release-artifact \
            --repo-root=. \
            --output=dist/wp-core-base-vendor-snapshot.zip \
            --checksum-file=dist/wp-core-base-vendor-snapshot.zip.sha256

      - name: Sign release checksum sidecar
        if: steps.existing_release.outputs.exists != 'true'
        env:
          WP_CORE_BASE_RELEASE_PRIVATE_KEY_PEM: ${{ secrets.WP_CORE_BASE_RELEASE_PRIVATE_KEY_PEM }}
          WP_CORE_BASE_RELEASE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.WP_CORE_BASE_RELEASE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          php tools/wporg-updater/bin/wporg-updater.php release-sign \
            --artifact=dist/wp-core-base-vendor-snapshot.zip \
            --checksum-file=dist/wp-core-base-vendor-snapshot.zip.sha256 \
            --signature-file=dist/wp-core-base-vendor-snapshot.zip.sha256.sig \
            --private-key-env=WP_CORE_BASE_RELEASE_PRIVATE_KEY_PEM \
            --passphrase-env=WP_CORE_BASE_RELEASE_PRIVATE_KEY_PASSPHRASE

      - name: Verify release artifact
        if: steps.existing_release.outputs.exists != 'true'
        run: |
          php tools/wporg-updater/bin/wporg-updater.php release-verify \
            --repo-root=. \
            --tag=${{ steps.version.outputs.value }} \
            --artifact=dist/wp-core-base-vendor-snapshot.zip \
            --checksum-file=dist/wp-core-base-vendor-snapshot.zip.sha256 \
            --signature-file=dist/wp-core-base-vendor-snapshot.zip.sha256.sig

      - name: Create GitHub release
        if: steps.existing_release.outputs.exists != 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ steps.version.outputs.value }}
          title: wp-core-base ${{ steps.version.outputs.value }}
          body_path: docs/releases/${{ steps.version.outputs.plain }}.md
          files: |
            dist/wp-core-base-vendor-snapshot.zip
            dist/wp-core-base-vendor-snapshot.zip.sha256
            dist/wp-core-base-vendor-snapshot.zip.sha256.sig

      - name: Report existing release
        if: steps.existing_release.outputs.exists == 'true'
        run: echo "GitHub Release ${{ steps.version.outputs.value }} already exists; nothing to publish."
