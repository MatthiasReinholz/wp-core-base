name: release-wp-core-base

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing release tag in vX.Y.Z format'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    name: Release wp-core-base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.version }}
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.3'
          coverage: none

      - name: Validate target version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"

          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use vX.Y.Z format." >&2
            exit 1
          fi

          echo "value=${version}" >> "$GITHUB_OUTPUT"
          echo "plain=${version#v}" >> "$GITHUB_OUTPUT"

      - name: Verify release tag comes from a merged release PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          bash scripts/ci/check_framework_release_pr.sh "${GITHUB_REPOSITORY}" "${{ steps.version.outputs.value }}" "$COMMIT_SHA"

      - name: Validate release metadata
        run: php tools/wporg-updater/bin/wporg-updater.php release-verify --repo-root=. --tag=${{ steps.version.outputs.value }}

      - name: Build vendored framework snapshot
        run: |
          mkdir -p dist/wp-core-base
          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.wp-core-base/build/' \
            --exclude 'dist/' \
            ./ dist/wp-core-base/
          cd dist
          zip -qr wp-core-base-vendor-snapshot.zip wp-core-base
          sha256sum wp-core-base-vendor-snapshot.zip | awk '{print $1}' > wp-core-base-vendor-snapshot.zip.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          tag_name: ${{ steps.version.outputs.value }}
          title: wp-core-base ${{ steps.version.outputs.value }}
          body_path: docs/releases/${{ steps.version.outputs.plain }}.md
          files: |
            dist/wp-core-base-vendor-snapshot.zip
            dist/wp-core-base-vendor-snapshot.zip.sha256
