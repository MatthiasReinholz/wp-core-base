name: release-wp-core-base

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Existing release tag in vX.Y.Z format'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: wp-core-base-release-release/${{ inputs.version }}
  cancel-in-progress: false

jobs:
  release:
    name: Release wp-core-base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ inputs.version }}
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.3'
          coverage: none

      - name: Validate target version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${{ inputs.version }}"

          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use vX.Y.Z format." >&2
            exit 1
          fi

          echo "value=${version}" >> "$GITHUB_OUTPUT"
          echo "plain=${version#v}" >> "$GITHUB_OUTPUT"

      - name: Verify release tag comes from a merged release PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          bash scripts/ci/check_framework_release_pr.sh "${GITHUB_REPOSITORY}" "${{ steps.version.outputs.value }}" "$COMMIT_SHA"

      - name: Verify merged release PR passed CI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          bash scripts/ci/check_framework_release_ci.sh "${GITHUB_REPOSITORY}" "${{ steps.version.outputs.value }}" "$COMMIT_SHA"

      - name: Validate release metadata
        run: php tools/wporg-updater/bin/wporg-updater.php release-verify --repo-root=. --tag=${{ steps.version.outputs.value }}

      - name: Build vendored framework snapshot
        run: |
          php tools/wporg-updater/bin/wporg-updater.php build-release-artifact \
            --repo-root=. \
            --output=dist/wp-core-base-vendor-snapshot.zip \
            --checksum-file=dist/wp-core-base-vendor-snapshot.zip.sha256

      - name: Sign release checksum sidecar
        env:
          WP_CORE_BASE_RELEASE_PRIVATE_KEY_PEM: ${{ secrets.WP_CORE_BASE_RELEASE_PRIVATE_KEY_PEM }}
          WP_CORE_BASE_RELEASE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.WP_CORE_BASE_RELEASE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          php tools/wporg-updater/bin/wporg-updater.php release-sign \
            --artifact=dist/wp-core-base-vendor-snapshot.zip \
            --checksum-file=dist/wp-core-base-vendor-snapshot.zip.sha256 \
            --signature-file=dist/wp-core-base-vendor-snapshot.zip.sha256.sig \
            --private-key-env=WP_CORE_BASE_RELEASE_PRIVATE_KEY_PEM \
            --passphrase-env=WP_CORE_BASE_RELEASE_PRIVATE_KEY_PASSPHRASE

      - name: Verify release artifact
        run: |
          php tools/wporg-updater/bin/wporg-updater.php release-verify \
            --repo-root=. \
            --tag=${{ steps.version.outputs.value }} \
            --artifact=dist/wp-core-base-vendor-snapshot.zip \
            --checksum-file=dist/wp-core-base-vendor-snapshot.zip.sha256 \
            --signature-file=dist/wp-core-base-vendor-snapshot.zip.sha256.sig

      - name: Assess published release asset state
        id: release_state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: |
          bash scripts/ci/check_framework_release_assets.sh \
            "${GITHUB_REPOSITORY}" \
            "${{ steps.version.outputs.value }}" \
            dist/wp-core-base-vendor-snapshot.zip \
            dist/wp-core-base-vendor-snapshot.zip.sha256 \
            dist/wp-core-base-vendor-snapshot.zip.sha256.sig

      - name: Create GitHub release
        if: steps.release_state.outputs.publish_required == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_tag="${{ steps.version.outputs.value }}"
          release_title="wp-core-base ${release_tag}"
          release_notes="docs/releases/${{ steps.version.outputs.plain }}.md"

          if gh release view "${release_tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${release_tag}" \
              dist/wp-core-base-vendor-snapshot.zip \
              dist/wp-core-base-vendor-snapshot.zip.sha256 \
              dist/wp-core-base-vendor-snapshot.zip.sha256.sig \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber

            gh release edit "${release_tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${release_title}" \
              --notes-file "${release_notes}"
          else
            gh release create "${release_tag}" \
              dist/wp-core-base-vendor-snapshot.zip \
              dist/wp-core-base-vendor-snapshot.zip.sha256 \
              dist/wp-core-base-vendor-snapshot.zip.sha256.sig \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${release_title}" \
              --notes-file "${release_notes}"
          fi

      - name: Verify published release assets are current
        if: steps.release_state.outputs.publish_required == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: |
          bash scripts/ci/check_framework_release_assets.sh \
            --require-current \
            "${GITHUB_REPOSITORY}" \
            "${{ steps.version.outputs.value }}" \
            dist/wp-core-base-vendor-snapshot.zip \
            dist/wp-core-base-vendor-snapshot.zip.sha256 \
            dist/wp-core-base-vendor-snapshot.zip.sha256.sig

      - name: Report existing verified release
        if: steps.release_state.outputs.publish_required != 'true'
        run: echo "GitHub Release ${{ steps.version.outputs.value }} already contains the current verified assets; nothing to publish."
