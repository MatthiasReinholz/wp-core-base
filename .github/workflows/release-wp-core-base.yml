name: release-wp-core-base

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Release wp-core-base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Validate target version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME}"

          if ! [[ "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must use vX.Y.Z format." >&2
            exit 1
          fi

          echo "value=${version}" >> "$GITHUB_OUTPUT"
          echo "plain=${version#v}" >> "$GITHUB_OUTPUT"

      - name: Re-run release gates
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: |
          php tools/wporg-updater/tests/run.php
          php tools/wporg-updater/bin/wporg-updater.php doctor --repo-root=. --github
          php tools/wporg-updater/bin/wporg-updater.php stage-runtime --repo-root=. --output=.wp-core-base/build/runtime
          php tools/wporg-updater/bin/wporg-updater.php release-verify --repo-root=. --tag=${{ steps.version.outputs.value }}

      - name: Build vendored framework snapshot
        run: |
          mkdir -p dist/wp-core-base
          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.wp-core-base/build/' \
            --exclude 'dist/' \
            ./ dist/wp-core-base/
          cd dist
          zip -qr wp-core-base-vendor-snapshot.zip wp-core-base

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          title: wp-core-base ${{ steps.version.outputs.value }}
          body_path: docs/releases/${{ steps.version.outputs.plain }}.md
          files: dist/wp-core-base-vendor-snapshot.zip
