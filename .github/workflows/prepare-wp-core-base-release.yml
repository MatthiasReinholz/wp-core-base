name: prepare-wp-core-base-release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'How to derive the next wp-core-base release version'
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
          - custom
      version:
        description: 'Release version in vX.Y.Z format when release type is custom'
        required: false
        type: string
      base_ref:
        description: 'Base branch for the release branch'
        required: true
        default: 'main'
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prepare-wp-core-base-release-${{ inputs.base_ref }}-${{ inputs.release_type }}-${{ inputs.version || 'auto' }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare wp-core-base release branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base ref
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.base_ref }}
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Prepare framework release metadata
        env:
          RELEASE_TYPE: ${{ inputs.release_type }}
          CUSTOM_VERSION: ${{ inputs.version }}
        run: |
          args=(
            "tools/wporg-updater/bin/wporg-updater.php"
            "prepare-framework-release"
            "--repo-root=."
            "--release-type=${RELEASE_TYPE}"
          )

          if [ "$RELEASE_TYPE" = "custom" ]; then
            args+=("--version=${CUSTOM_VERSION}")
          fi

          php "${args[@]}"

      - name: Read target version
        id: framework
        run: php -r '$framework=require ".wp-core-base/framework.php"; echo "version=v".$framework["version"].PHP_EOL; echo "version_plain=".$framework["version"].PHP_EOL; echo "notes=docs/releases/".$framework["version"].".md".PHP_EOL;' >> "$GITHUB_OUTPUT"

      - name: Verify prepared release metadata
        run: php tools/wporg-updater/bin/wporg-updater.php release-verify --repo-root=. --tag=${{ steps.framework.outputs.version }}

      - name: Create or update release pull request
        uses: peter-evans/create-pull-request@v7
        with:
          branch: release/${{ steps.framework.outputs.version }}
          base: ${{ inputs.base_ref }}
          commit-message: Prepare wp-core-base release ${{ steps.framework.outputs.version }}
          title: wp-core-base release ${{ steps.framework.outputs.version }}
          body: |
            This PR was created by the `prepare-wp-core-base-release` workflow.

            Included changes:
            - bump `.wp-core-base/framework.php` to `${{ steps.framework.outputs.version }}`
            - create or update `${{ steps.framework.outputs.notes }}`
            - prepare the repository for the `${{ steps.framework.outputs.version }}` tag

            Before merge:
            - complete the release notes
            - review the release metadata like any normal code change

            After merge:
            - `finalize-wp-core-base-release` creates and pushes the annotated `${{ steps.framework.outputs.version }}` tag automatically
            - the pushed tag triggers `release-wp-core-base` automatically
          delete-branch: false
