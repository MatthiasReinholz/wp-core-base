name: wp-core-base CI

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Run doctor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: php tools/wporg-updater/bin/wporg-updater.php doctor --repo-root=. --github

      - name: Lint PHP sources
        run: find tools/wporg-updater -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Run test suite
        run: php tools/wporg-updater/tests/run.php

      - name: Stage runtime payload
        run: php tools/wporg-updater/bin/wporg-updater.php stage-runtime --repo-root=. --output=.wp-core-base/build/runtime

      - name: Verify release metadata
        run: php tools/wporg-updater/bin/wporg-updater.php release-verify --repo-root=.
