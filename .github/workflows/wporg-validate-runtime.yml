name: wp-core-base CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-version:
          - '8.1'
          - '8.3'
          - '8.4'
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: ${{ matrix.php-version }}
          coverage: none

      - name: Run doctor
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: php tools/wporg-updater/bin/wporg-updater.php doctor --repo-root=. --github

      - name: Lint PHP sources
        run: find tools/wporg-updater -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Verify workflow examples and permissions
        run: php scripts/ci/check_workflow_examples_and_permissions.php

      - name: Run test suite
        run: php tools/wporg-updater/tests/run.php

      - name: Stage runtime payload
        run: php tools/wporg-updater/bin/wporg-updater.php stage-runtime --repo-root=. --output=.wp-core-base/build/runtime

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.3'
          coverage: none
          tools: phpstan

      - name: Install actionlint
        run: |
          curl -fsSL -o /tmp/actionlint.tar.gz https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Run actionlint
        run: /tmp/actionlint -color

      - name: Run shellcheck
        run: shellcheck scripts/ci/*.sh

      - name: Test release CI helper scripts
        run: bash scripts/ci/test_release_scripts.sh

      - name: Run PHPStan
        run: phpstan analyse --configuration=phpstan.neon.dist --no-progress

      - name: Build release verification fixture
        run: |
          php tools/wporg-updater/bin/wporg-updater.php build-release-artifact \
            --repo-root=. \
            --output=dist/wp-core-base-vendor-snapshot.zip \
            --checksum-file=dist/wp-core-base-vendor-snapshot.zip.sha256

      - name: Sign release verification fixture
        run: |
          PRIVATE_KEY="$(cat tools/wporg-updater/tests/fixtures/release-signing/private.pem)"
          WP_CORE_BASE_RELEASE_TEST_PRIVATE_KEY_PEM="$PRIVATE_KEY" \
            php tools/wporg-updater/bin/wporg-updater.php release-sign \
              --artifact=dist/wp-core-base-vendor-snapshot.zip \
              --checksum-file=dist/wp-core-base-vendor-snapshot.zip.sha256 \
              --signature-file=dist/wp-core-base-vendor-snapshot.zip.sha256.sig \
              --private-key-env=WP_CORE_BASE_RELEASE_TEST_PRIVATE_KEY_PEM

      - name: Verify release metadata and artifact
        run: |
          php tools/wporg-updater/bin/wporg-updater.php release-verify \
            --repo-root=. \
            --artifact=dist/wp-core-base-vendor-snapshot.zip \
            --checksum-file=dist/wp-core-base-vendor-snapshot.zip.sha256 \
            --signature-file=dist/wp-core-base-vendor-snapshot.zip.sha256.sig \
            --public-key-file="${GITHUB_WORKSPACE}/tools/wporg-updater/tests/fixtures/release-signing/public.pem"

  downstream-fixtures:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        profile:
          - full-core
          - content-only
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.3'
          coverage: none

      - name: Verify downstream fixture
        run: php scripts/ci/verify_downstream_fixture.php --profile=${{ matrix.profile }}
