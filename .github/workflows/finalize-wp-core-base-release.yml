name: finalize-wp-core-base-release

on:
  pull_request_target:
    types:
      - closed

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: write

jobs:
  release:
    name: Publish merged wp-core-base release
    if: >
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest

    steps:
      - name: Derive release version
        id: release
        env:
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          if [[ "$HEAD_REF" =~ ^release/(v[0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            echo "plain=${BASH_REMATCH[1]#v}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Unsupported release branch: $HEAD_REF" >&2
          exit 1

      - name: Checkout merge commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.3'
          coverage: none

      - name: Validate release metadata
        run: php tools/wporg-updater/bin/wporg-updater.php release-verify --repo-root=. --tag=${{ steps.release.outputs.version }}

      - name: Verify merged release PR passed CI
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: |
          COMMIT_SHA="${{ github.event.pull_request.merge_commit_sha }}"
          bash scripts/ci/check_framework_release_ci.sh "${GITHUB_REPOSITORY}" "${{ steps.release.outputs.version }}" "$COMMIT_SHA"

      - name: Build vendored framework snapshot
        run: |
          php tools/wporg-updater/bin/wporg-updater.php build-release-artifact \
            --repo-root=. \
            --output=dist/wp-core-base-vendor-snapshot.zip \
            --checksum-file=dist/wp-core-base-vendor-snapshot.zip.sha256

      - name: Sign release checksum sidecar
        env:
          WP_CORE_BASE_RELEASE_PRIVATE_KEY_PEM: ${{ secrets.WP_CORE_BASE_RELEASE_PRIVATE_KEY_PEM }}
          WP_CORE_BASE_RELEASE_PRIVATE_KEY_PASSPHRASE: ${{ secrets.WP_CORE_BASE_RELEASE_PRIVATE_KEY_PASSPHRASE }}
        run: |
          php tools/wporg-updater/bin/wporg-updater.php release-sign \
            --artifact=dist/wp-core-base-vendor-snapshot.zip \
            --checksum-file=dist/wp-core-base-vendor-snapshot.zip.sha256 \
            --signature-file=dist/wp-core-base-vendor-snapshot.zip.sha256.sig \
            --private-key-env=WP_CORE_BASE_RELEASE_PRIVATE_KEY_PEM \
            --passphrase-env=WP_CORE_BASE_RELEASE_PRIVATE_KEY_PASSPHRASE

      - name: Verify release artifact
        run: |
          php tools/wporg-updater/bin/wporg-updater.php release-verify \
            --repo-root=. \
            --tag=${{ steps.release.outputs.version }} \
            --artifact=dist/wp-core-base-vendor-snapshot.zip \
            --checksum-file=dist/wp-core-base-vendor-snapshot.zip.sha256 \
            --signature-file=dist/wp-core-base-vendor-snapshot.zip.sha256.sig

      - name: Ensure tag does not already exist
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          if git ls-remote --exit-code --tags origin "refs/tags/${VERSION}" >/dev/null 2>&1; then
            echo "Tag ${VERSION} already exists." >&2
            exit 1
          fi

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create annotated tag
        run: git -c tag.gpgsign=false tag -a "${{ steps.release.outputs.version }}" -m "wp-core-base ${{ steps.release.outputs.version }}"

      - name: Push tag
        run: git push origin "${{ steps.release.outputs.version }}"

      - name: Create GitHub release
        id: create_release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
        with:
          overwrite_files: true
          tag_name: ${{ steps.release.outputs.version }}
          title: wp-core-base ${{ steps.release.outputs.version }}
          body_path: docs/releases/${{ steps.release.outputs.plain }}.md
          files: |
            dist/wp-core-base-vendor-snapshot.zip
            dist/wp-core-base-vendor-snapshot.zip.sha256
            dist/wp-core-base-vendor-snapshot.zip.sha256.sig

      - name: Verify published release assets are current
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
        run: |
          bash scripts/ci/check_framework_release_assets.sh \
            --require-current \
            "${GITHUB_REPOSITORY}" \
            "${{ steps.release.outputs.version }}" \
            dist/wp-core-base-vendor-snapshot.zip \
            dist/wp-core-base-vendor-snapshot.zip.sha256 \
            dist/wp-core-base-vendor-snapshot.zip.sha256.sig

      - name: Roll back tag and release on publish failure
        if: ${{ failure() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          release_lookup_status="$(
            curl -sS \
              -o /tmp/wp-core-base-release-rollback.json \
              -w "%{http_code}" \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GITHUB_TOKEN}" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases/tags/${VERSION}"
          )"

          if [ "${release_lookup_status}" = '200' ]; then
            release_id="$(jq -r '.id' /tmp/wp-core-base-release-rollback.json)"

            if [ -n "${release_id}" ] && [ "${release_id}" != 'null' ]; then
              curl -fsSL \
                -X DELETE \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer ${GITHUB_TOKEN}" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/releases/${release_id}" >/dev/null
            fi
          fi

          git tag -d "$VERSION" || true
          git push --delete origin "$VERSION" || true
