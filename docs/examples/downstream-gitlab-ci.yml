stages:
  - validate
  - automation

# Required CI/CD variable for GitLab-hosted automation:
# - GITLAB_TOKEN: masked project or group access token with API and write_repository access

.wp_core_base_setup: &wp_core_base_setup
  image: ubuntu:24.04
  before_script:
    - apt-get update
    - DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends ca-certificates git php-cli php-curl php-xml php-zip unzip
    - git config user.name "wp-core-base bot"
    - git config user.email "wp-core-base-bot@users.noreply.gitlab.com"
    - |
      if [ -z "${GITLAB_TOKEN:-}" ]; then
        echo "GITLAB_TOKEN is required for wp-core-base GitLab automation jobs." >&2
        echo "Add it as a masked CI/CD variable with API and write_repository access." >&2
        exit 1
      fi
      git remote set-url origin "https://oauth2:${GITLAB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
  variables:
    GITLAB_PROJECT_ID: "$CI_PROJECT_ID"
    WPORG_REPO_ROOT: "$CI_PROJECT_DIR"

wp_core_base_sync:
  stage: automation
  resource_group: wp-core-base-dependency-sync
  extends: .wp_core_base_setup
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - php vendor/wp-core-base/tools/wporg-updater/bin/wporg-updater.php sync --report-json=.wp-core-base/build/sync-report.json --fail-on-source-errors
    - php vendor/wp-core-base/tools/wporg-updater/bin/wporg-updater.php render-sync-report --repo-root=. --report-json=.wp-core-base/build/sync-report.json --summary-path=.wp-core-base/build/sync-summary.md
    - php vendor/wp-core-base/tools/wporg-updater/bin/wporg-updater.php sync-report-issue --repo-root=. --report-json=.wp-core-base/build/sync-report.json
  artifacts:
    when: always
    paths:
      - .wp-core-base/build/sync-report.json
      - .wp-core-base/build/sync-summary.md

wp_core_base_pr_blocker:
  stage: validate
  extends: .wp_core_base_setup
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - php vendor/wp-core-base/tools/wporg-updater/bin/wporg-updater.php pr-blocker --repo-root=. --json

wp_core_base_pr_blocker_reconcile:
  stage: automation
  extends: .wp_core_base_setup
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  script:
    - php vendor/wp-core-base/tools/wporg-updater/bin/wporg-updater.php pr-blocker-reconcile --repo-root=. --json

wp_core_base_validate_runtime:
  stage: validate
  extends: .wp_core_base_setup
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  script:
    - php vendor/wp-core-base/tools/wporg-updater/bin/wporg-updater.php doctor --repo-root=. --automation
    - php vendor/wp-core-base/tools/wporg-updater/bin/wporg-updater.php stage-runtime --repo-root=. --output=.wp-core-base/build/runtime

wp_core_base_framework_sync:
  stage: automation
  resource_group: wp-core-base-framework-update
  extends: .wp_core_base_setup
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  script:
    - php vendor/wp-core-base/tools/wporg-updater/bin/wporg-updater.php framework-sync --repo-root=.
