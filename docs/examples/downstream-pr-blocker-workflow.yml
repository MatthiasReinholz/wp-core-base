# This file belongs in the downstream repository, not in wp-core-base itself.
# It keeps later WordPress core and plugin update PRs blocked until earlier ones are resolved.

name: WordPress.org Update PR Blocker

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

permissions:
  pull-requests: read
  issues: read

jobs:
  blocker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out downstream repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Evaluate blocker state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          WPORG_REPO_ROOT: ${{ github.workspace }}
        # Change vendor/wp-core-base if you keep wp-core-base in another path.
        run: php vendor/wp-core-base/tools/wporg-updater/bin/wporg-updater.php pr-blocker
