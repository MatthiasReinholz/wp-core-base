# This file belongs in the downstream repository, not in wp-core-base itself.
# It keeps later update PRs blocked until earlier PRs for the same dependency are resolved.

name: wp-core-base PR Blocker

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - synchronize
      - edited
      - ready_for_review

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  blocker:
    runs-on: ubuntu-latest
    steps:
      - name: Check out downstream repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          ref: ${{ github.event.pull_request.base.ref }}

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.3'
          coverage: none

      - name: Evaluate blocker state
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          WPORG_REPO_ROOT: ${{ github.workspace }}
        run: php vendor/wp-core-base/tools/wporg-updater/bin/wporg-updater.php pr-blocker
