# This file belongs in the downstream repository, not in wp-core-base itself.
# It reruns update reconciliation after a framework-managed PR is merged.

name: wp-core-base Update Reconciliation

on:
  pull_request_target:
    types:
      - closed

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: wp-core-base-dependency-sync
  cancel-in-progress: false

jobs:
  sync:
    if: >
      github.event.pull_request.merged == true &&
      (
        contains(github.event.pull_request.labels.*.name, 'automation:dependency-update') ||
        contains(github.event.pull_request.labels.*.name, 'automation:framework-update')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Check out downstream project
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@accd6127cb78bee3e8082180cb391013d204ef9f
        with:
          php-version: '8.3'
          coverage: none

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run updater against downstream repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          WP_CORE_BASE_PREMIUM_CREDENTIALS_JSON: ${{ secrets.WP_CORE_BASE_PREMIUM_CREDENTIALS_JSON }}
          WPORG_REPO_ROOT: ${{ github.workspace }}
        run: php vendor/wp-core-base/tools/wporg-updater/bin/wporg-updater.php sync --report-json=.wp-core-base/build/sync-report.json --fail-on-source-errors

      - name: Publish sync summary
        if: ${{ always() }}
        env:
          WPORG_REPO_ROOT: ${{ github.workspace }}
        run: php vendor/wp-core-base/tools/wporg-updater/bin/wporg-updater.php render-sync-report --repo-root=. --report-json=.wp-core-base/build/sync-report.json --summary-path="${GITHUB_STEP_SUMMARY}"

      - name: Sync source-failure issue
        if: ${{ always() }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_API_URL: ${{ github.api_url }}
          WPORG_REPO_ROOT: ${{ github.workspace }}
        run: php vendor/wp-core-base/tools/wporg-updater/bin/wporg-updater.php sync-report-issue --repo-root=. --report-json=.wp-core-base/build/sync-report.json
