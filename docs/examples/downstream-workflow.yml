name: Sync Upstream Base

on:
  workflow_dispatch:
  schedule:
    - cron: '23 5 * * *'

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out downstream project
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Run upstream updater against downstream repo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          WPORG_REPO_ROOT: ${{ github.workspace }}
        run: php vendor/wp-core-base/tools/wporg-updater/bin/wporg-updater.php sync
